<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uiverse Style Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2 class="title">Neon Password</h2>
        
        <div class="result-box">
            <span id="result">P@ssw0rd123</span>
            <button id="clipboard" title="Nusxa olish">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
            </button>
        </div>

        <div class="settings">
            <div class="range-group">
                <label>Uzunlik: <span id="length-val">12</span></label>
                <input type="range" id="length" min="6" max="32" value="12" class="slider">
            </div>

            <div class="grid-settings">
                <label class="container">Katta harf
                    <input type="checkbox" id="uppercase" checked>
                    <div class="checkmark"></div>
                </label>
                <label class="container">Kichik harf
                    <input type="checkbox" id="lowercase" checked>
                    <div class="checkmark"></div>
                </label>
                <label class="container">Raqamlar
                    <input type="checkbox" id="numbers" checked>
                    <div class="checkmark"></div>
                </label>
                <label class="container">Simvollar
                    <input type="checkbox" id="symbols">
                    <div class="checkmark"></div>
                </label>
            </div>
        </div>
        

        <button id="generate" class="generate-btn">
            GENERATSIYA QILISH
        </button>
    </div>
    <script src="script.js"></script>
</body>
</html>
